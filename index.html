<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Lami Art Studio explores West African Islamic art, Arabic calligraphy, and English calligraphy.">
    <title>Lami Art Studio</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page" aria-label="Lami Art Studio home page">
      <section id="home" class="slice hero-slice" aria-label="Lami Art Studio">
        <img src="assets/sections/01-hero.png" alt="Lami Art Studio hero with artwork and navigation">
        <nav class="hero-links" aria-label="Primary navigation">
          <a class="hit hit-blog" href="#blog">Blog</a>
          <a class="hit hit-about" href="#about">About</a>
          <a class="hit hit-gallery" href="#gallery">Gallery</a>
          <a class="hit hit-contact" href="#contact">Contact</a>
        </nav>
      </section>

      <section id="blog" class="slice quote-slice" aria-label="Calligraphy quote">
        <img src="assets/sections/02-hero-quote.png" alt="At first, practice on a wooden slate board">
      </section>

      <section class="slice intro-slice" aria-label="Welcome to Lami Art Studio">
        <img src="assets/sections/03-intro-artwork.png" alt="Welcome text and Arabic calligraphy artwork">
      </section>

      <section class="slice board-slice" aria-label="Wooden board artwork">
        <img src="assets/sections/04-full-width-artwork.png" alt="Decorated wooden board with Arabic calligraphy">
      </section>

      <section id="about" class="slice brown-slice" aria-label="Artwork on brown background">
        <img src="assets/sections/05-artwork-on-brown.png" alt="Arabic calligraphy artwork on a brown background">
      </section>

      <section class="slice vision-slice" aria-label="Studio vision">
        <img src="assets/sections/06-vision.png" alt="Our vision statement">
      </section>

      <section id="gallery" class="slice gallery-slice" aria-label="Visit the gallery">
        <img src="assets/sections/07-visit-gallery.png" alt="Visit the gallery with horse artwork">
      </section>

      <footer id="contact" class="slice footer-slice" aria-label="Contact and footer navigation">
        <img src="assets/sections/08-footer.png" alt="Contact message, Halima Lami signature, and footer navigation">
        <nav class="footer-links" aria-label="Footer navigation">
          <a class="hit foot-blog" href="#blog">Blog</a>
          <a class="hit foot-about" href="#about">About</a>
          <a class="hit foot-gallery" href="#gallery">Gallery</a>
          <a class="hit foot-contact" href="#contact">Contact</a>
        </nav>
      </footer>
    </main>
  </body>
</html>
