<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact | Lami Art Studio</title>
    <link rel="stylesheet" href="styles.css?v=inner-page-header">
  </head>
  <body class="simple-page inner-page contact-page">
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-logo" href="index.html">Lami Art Studio</a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="mobile-menu" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav" aria-label="Primary navigation">
          <a href="https://halimalami.substack.com/" target="_blank" rel="noopener noreferrer">Blog</a>
          <a href="about.html">About</a>
          <a href="gallery/">Gallery</a>
          <a class="is-active" href="contact.html">Contact</a>
        </nav>
      </div>
    </header>
    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <div class="mobile-menu-header">
        <a class="site-logo" href="index.html">Lami Art Studio</a>
        <button class="menu-toggle mobile-menu-close" type="button" aria-expanded="true" aria-controls="mobile-menu" aria-label="Close menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="mobile-menu-nav" aria-label="Mobile navigation">
        <a href="https://halimalami.substack.com/" target="_blank" rel="noopener noreferrer">Blog</a>
        <a href="about.html">About</a>
        <a href="gallery/">Gallery</a>
      </nav>
      <a class="mobile-menu-contact is-active" href="contact.html">
        <span>Write an<br>email to me</span>
        <strong>Stay connected</strong>
      </a>
    </div>

    <main class="simple-page-inner">
      <h1>Contact</h1>
    </main>
    <script>
      const menu = document.querySelector(".mobile-menu");
      const toggles = document.querySelectorAll(".menu-toggle");

      toggles.forEach((toggle) => {
        toggle.addEventListener("click", () => {
          const open = !document.body.classList.contains("menu-open");
          document.body.classList.toggle("menu-open", open);
          menu.setAttribute("aria-hidden", String(!open));
          toggles.forEach((button) => button.setAttribute("aria-expanded", String(open)));
        });
      });
    </script>
  </body>
</html>
